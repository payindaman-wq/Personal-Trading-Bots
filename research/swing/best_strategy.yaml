name: skadi
style: multi_tf_trend_macd_rsi — weekly trend with MACD confirmation and RSI range filter
pairs:
  - BTC/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 48
        operator: in
        value: [up, flat]
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 40
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 60
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 48
        operator: in
        value: [down, flat]
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 60
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 40
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18