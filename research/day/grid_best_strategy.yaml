name: grid_best_day
style: 'Grid-optimized: TP=2.5% SL=3.0%'
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- XRP/USD
- ADA/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bullish
    - indicator: price_change_pct
      period_minutes: 15
      operator: lt
      value: -1.0
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 35
  short:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bearish
    - indicator: price_change_pct
      period_minutes: 15
      operator: gt
      value: 1.0
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 65
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 3.0
  timeout_minutes: 180
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10
