name: crossover
style: Pure momentum strategy focusing on 8 pairs with tight entry conditions and
  a high TP/SL ratio to capture strong trends. Increased position size and max open
  trades to leverage conviction. Removed momentum_accelerating for increased trade
  frequency.
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- XRP/USD
- ADA/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bullish
    - indicator: price_change_pct
      period_minutes: 15
      operator: lt
      value: -1.08
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 35.0
  short:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bearish
    - indicator: price_change_pct
      period_minutes: 15
      operator: gt
      value: 1.09
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 65
exit:
  take_profit_pct: 6.0
  stop_loss_pct: 0.5
  timeout_minutes: 628
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10
_sharpe: 1.0534
