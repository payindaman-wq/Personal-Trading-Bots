name: autobotday
style: trend-confirmed RSI pullback with VWAP filter and momentum confirmation, tighter stop loss and reduced trade frequency, with MACD confirmation for higher quality entries. Focus on reducing trades by increasing TP and tightening SL. Slightly increased take profit to reduce trade frequency further. Added bollinger_position to filter out noisy entries.
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: price_vs_vwap
        period_minutes: 15
        operator: eq
        value: below
      - indicator: rsi
        period_minutes: 30
        operator: lt
        value: 40
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bullish
      - indicator: bollinger_position
        period_minutes: 30
        operator: eq
        value: inside
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: price_vs_vwap
        period_minutes: 15
        operator: eq
        value: above
      - indicator: rsi
        period_minutes: 30
        operator: gt
        value: 60
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bearish
      - indicator: bollinger_position
        period_minutes: 30
        operator: eq
        value: inside
exit:
  take_profit_pct: 2.8
  stop_loss_pct: 0.4
  timeout_minutes: 240
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10