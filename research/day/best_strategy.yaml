name: autobotday
style: Pure momentum strategy focusing on 6 pairs with tight entry conditions and a high TP/SL ratio to capture strong trends. Increased position size and max open trades to leverage conviction.
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bullish
      - indicator: price_change_pct
        period_minutes: 15
        operator: lt
        value: -1.0
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bearish
      - indicator: price_change_pct
        period_minutes: 15
        operator: gt
        value: 1.0
exit:
  take_profit_pct: 6.0
  stop_loss_pct: 0.5
  timeout_minutes: 480
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10