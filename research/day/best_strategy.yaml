name: autobotday
style: multi_tf_trend_rsi_vwap — trend-confirmed RSI pullback with VWAP filter
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 30
        operator: lt
        value: 38
      - indicator: price_vs_vwap
        period_minutes: 5
        operator: eq
        value: below
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [down, flat]
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 30
        operator: gt
        value: 62
      - indicator: price_vs_vwap
        period_minutes: 5
        operator: eq
        value: above
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [up, flat]
exit:
  take_profit_pct: 2.2
  stop_loss_pct: 0.6
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10