name: Deploy to VPS

# Public template — auto-deploy is disabled.
# To enable: add VPS_HOST and VPS_SSH_KEY secrets to your fork,
# then change "on:" to "on:\n  push:\n    branches: [master]"
# See docs/vps_setup.md for full setup instructions.

on:
  workflow_dispatch:

jobs:
  setup-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Configure VPS secrets
        run: |
          echo "Auto-deploy is disabled in the public template."
          echo "Add VPS_HOST and VPS_SSH_KEY secrets to enable it."
          echo "See docs/vps_setup.md for instructions."
