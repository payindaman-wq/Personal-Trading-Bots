name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.167.19
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Sync to latest master — hard reset avoids local-change conflicts.
            # Runtime data (competition/results, price_history, etc.) is gitignored
            # so it is never touched by this reset.
            cd /root/.openclaw/workspace
            git fetch origin master
            git reset --hard origin/master

            # Ensure /var/www/dashboard/index.html is a symlink to the workspace file
            # (cp would replace the symlink with a regular file on every deploy)
            ln -sf /root/.openclaw/workspace/dashboard/index.html /var/www/dashboard/index.html

            # Refresh dashboard data
            python3 /root/.openclaw/workspace/dashboard_data.py

            echo "Deploy complete"
