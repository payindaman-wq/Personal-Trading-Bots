# crypto-trading-toolkit — configuration template
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored — never commit it.

config_version: 1   # REQUIRED — must be the first key. Do not change this value.

mode: "full"   # "full" (all AI officers) or "lite" (no AI, pull strategies from upstream)

anthropic:
  api_key: ""               # Anthropic API key (or set ANTHROPIC_API_KEY env var)
  daily_budget_usd: 10      # Hard cap on daily Anthropic spend in USD
  throttle_at_pct: 80       # Alert when daily spend exceeds this % of budget

gemini:
  api_key: ""               # Google Gemini API key (or set GEMINI_API_KEY env var)

kraken:
  api_key: ""               # Kraken API key (or set KRAKEN_API_KEY env var)
  api_secret: ""            # Kraken API secret (or set KRAKEN_API_SECRET env var)

telegram:
  bot_token: ""             # Telegram bot token from @BotFather (or set TELEGRAM_BOT_TOKEN env var)
  chat_id: ""               # Your Telegram numeric user ID (or set TELEGRAM_CHAT_ID env var)

vps:
  host: ""                  # VPS IP or hostname (e.g. "1.2.3.4")
  workspace: "/root/.openclaw/workspace"  # Absolute path to this repo on the VPS

upstream:
  repo: "https://github.com/payindaman-wq/Personal-Trading-Bots"  # public template — friends pull champion strategies from here
  branch: "master"
  pat: ""  # GitHub PAT with public_repo scope for pushing to upstream.repo (or set UPSTREAM_PAT env var)

dashboard:
  domain: ""                # Dashboard domain or IP (e.g. "dashboard.example.com")
  branding: "Trading Toolkit"  # Title shown in the dashboard UI

mission:
  target: "Define your own profit target"

fleet:
  leagues_enabled:          # Which league types to activate
    - day
    - swing
    - futures_day
    - futures_swing
    - polymarket

# NJORD Capital Allocation Officer (cron-based, every 30 min when enabled).
# Default disabled. Workflow: enabled+paper for >=1 week, review njord.log,
# then switch to live. See docs/njord.md for the full activation flow.
njord:
  enabled: false              # set true to start the officer (paper or live)
  mode: "paper"               # "paper" or "live". paper requires no Kraken keys.
  total_capital_usd: 0        # required if mode=live; sets paper-balance cap if paper
  per_bot_max_pct: 10         # cap on any single bot as % of total
  drawdown_kill_pct: 15       # individual-bot drawdown kill trigger
  league_weights:             # league weights (sum should be <= 1.0)
    day: 0.35
    swing: 0.25
    futures_day: 0.20
    futures_swing: 0.10
    polymarket: 0.10
  telegram_required_for_tier3: true   # page Chris on tier3 (wallet/keys/retire)
