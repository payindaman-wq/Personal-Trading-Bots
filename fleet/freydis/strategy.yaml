name: freydis
style: contrarian_extreme_reversal
inspiration: GCRClassic -- bets against consensus at confirmed extremes, RSI + BB both at limit simultaneously = high-probability reversal, wide TP to justify the patience
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 28
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: price_change_pct
        period_minutes: 30
        operator: lt
        value: -1.5
  short:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 72
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: price_change_pct
        period_minutes: 30
        operator: gt
        value: 1.5
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 0.7
  timeout_minutes: 120
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
