name: freydis
style: contrarian_extreme_reversal
inspiration: GCRClassic -- bets against consensus at confirmed extremes, conviction-sized positions on deep capitulation or euphoria
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 25
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: price_change_pct
        period_minutes: 30
        operator: lt
        value: -2.0
  short:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 75
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: price_change_pct
        period_minutes: 30
        operator: gt
        value: 2.0
exit:
  take_profit_pct: 3.5
  stop_loss_pct: 1.0
  timeout_minutes: 180
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
