name: freydis
style: extreme_reversal
inspiration: GCRClassic -- bets against consensus at confirmed extremes, conviction-sized positions on deep capitulation or euphoria
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 25
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: volume_above_avg
        period_minutes: 10
        operator: gt
        value: 1.2
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 75
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: volume_above_avg
        period_minutes: 10
        operator: gt
        value: 1.2
exit:
  take_profit_pct: 0.7
  stop_loss_pct: 0.5
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 45
  stop_if_down_pct: 8
