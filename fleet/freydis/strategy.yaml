name: freydis
style: extreme_reversal
inspiration: GCRClassic -- bets against consensus at confirmed extremes, conviction-sized positions on deep capitulation or euphoria
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 28
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 72
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
exit:
  take_profit_pct: 0.8
  stop_loss_pct: 0.4
  timeout_minutes: 90
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
