name: sigurd
style: altcoin_momentum_rotation
inspiration: Michael van de Poppe -- catches alt pullbacks in trending markets, buys dips on alts showing macro strength
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - WIF/USD
  - PEPE/USD
position:
  size_pct: 20
  max_open: 3
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 38
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 62
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 0.7
  timeout_minutes: 90
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
