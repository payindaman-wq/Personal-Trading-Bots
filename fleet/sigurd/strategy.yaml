name: sigurd
style: altcoin_momentum_rotation
inspiration: Michael van de Poppe -- catches alt pullbacks in trending markets, buys dips on alts showing macro strength
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 45
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
      - indicator: volume_above_avg
        period_minutes: 15
        operator: gt
        value: 1.2
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 55
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
      - indicator: volume_above_avg
        period_minutes: 15
        operator: gt
        value: 1.2
exit:
  take_profit_pct: 0.45
  stop_loss_pct: 0.4
  timeout_minutes: 45
risk:
  pause_if_down_pct: 4
  pause_minutes: 30
  stop_if_down_pct: 8
