name: sigurd
style: altcoin_momentum_rotation
inspiration: Michael van de Poppe -- catches alt pullbacks in trending markets, buys dips on alts showing macro strength
pairs:
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
  - SUI/USD
  - NEAR/USD
  - APT/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 35
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: trend
        period_minutes: 30
        operator: in
        value: [down, flat]
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 65
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: trend
        period_minutes: 30
        operator: in
        value: [up, flat]
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 0.7
  timeout_minutes: 90
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10
