name: autobotday
style: trend-confirmed RSI pullback with VWAP filter
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: price_vs_vwap
        period_minutes: 5
        operator: eq
        value: below
      - indicator: rsi
        period_minutes: 30
        operator: lt
        value: 40
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: price_vs_vwap
        period_minutes: 5
        operator: eq
        value: above
      - indicator: rsi
        period_minutes: 30
        operator: gt
        value: 60
exit:
  take_profit_pct: 2.0
  stop_loss_pct: 0.7
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10