name: autobotday
style: Reduced trade frequency by tightening the price_change_pct condition and increasing the timeout slightly, aiming for higher conviction trades. Added a momentum_accelerating condition to filter for stronger moves. Increased take profit to reduce premature exits and potentially improve win rate and Sharpe. Adjusted RSI thresholds for better entry timing and slightly reduced stop-loss to control risk on lower conviction trades.
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: price_vs_vwap
        period_minutes: 15
        operator: eq
        value: below
      - indicator: rsi
        period_minutes: 30
        operator: lt
        value: 35 # Tightened RSI threshold for long entries
      - indicator: price_change_pct
        period_minutes: 15
        operator: lt
        value: -0.7 # Slightly less stringent price_change_pct for more opportunities
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bullish
      - indicator: bollinger_position
        period_minutes: 30
        operator: eq
        value: inside
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: price_vs_vwap
        period_minutes: 15
        operator: eq
        value: above
      - indicator: rsi
        period_minutes: 30
        operator: gt
        value: 65 # Tightened RSI threshold for short entries
      - indicator: price_change_pct
        period_minutes: 15
        operator: gt
        value: 0.7 # Slightly less stringent price_change_pct for more opportunities
      - indicator: macd_signal
        period_minutes: 60
        operator: eq
        value: bearish
      - indicator: bollinger_position
        period_minutes: 30
        operator: eq
        value: inside
      - indicator: momentum_accelerating
        period_minutes: 15
        operator: eq
        value: true
exit:
  take_profit_pct: 3.5
  stop_loss_pct: 0.45 # Slightly reduced stop loss for faster exits on losing trades
  timeout_minutes: 300
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10