name: leif
style: bb_squeeze_breakout
inspiration: Rekt Capital -- enters during Bollinger Band compression with trend alignment, positioned for the expansion
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - LINK/USD
position:
  size_pct: 22
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 45
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
  short:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 55
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
exit:
  take_profit_pct: 2.8
  stop_loss_pct: 0.8
  timeout_minutes: 150
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
