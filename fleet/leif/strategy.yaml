name: leif
style: bb_squeeze_breakout
inspiration: Rekt Capital -- waits for Bollinger Band squeeze then trades the expansion, requires momentum confirmation in trend direction
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - LINK/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: momentum_accelerating
        period_minutes: 30
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 55
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
  short:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: momentum_accelerating
        period_minutes: 30
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 45
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
exit:
  take_profit_pct: 2.0
  stop_loss_pct: 0.6
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
