name: leif
style: bollinger_breakout_rider
inspiration: Rekt Capital -- enters on Bollinger Band breakout with trend and momentum alignment
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 14
        operator: gt
        value: 50
      - indicator: volume_above_avg
        period_minutes: 20
        operator: gt
        value: 1.2
  short:
    conditions:
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 14
        operator: lt
        value: 50
      - indicator: volume_above_avg
        period_minutes: 20
        operator: gt
        value: 1.2
exit:
  take_profit_pct: 0.5
  stop_loss_pct: 0.3
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 30
  stop_if_down_pct: 8
