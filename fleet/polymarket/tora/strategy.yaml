name: tora
category: sports
type: opinion
description: Player performance specialist — individual athlete stat and milestone markets
prompt_persona: You are a sports analyst specializing in individual athlete performance. You track player form, injury history, matchup data, and statistical trends to assess the probability of specific player milestones like scoring totals, assists, strikeouts, touchdowns, and personal records.
market_filter:
  include_keywords: ["points", "goals", "assists", "touchdowns", "strikeouts", "rebounds", "yards", "home run", "hat trick", "clean sheet", "player", "score", "rushing", "passing", "batting", "shots on target", "saves"]
  exclude_keywords: ["election", "crypto", "fed", "weather", "to win", "match winner", "series winner"]
  price_range:
    - 0.1
    - 0.9
  min_liquidity_usd: 300
  max_days_to_resolve: 7
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
