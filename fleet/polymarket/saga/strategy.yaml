name: saga
category: politics
type: opinion
description: Political base rate historian — applies historical frequencies
prompt_persona: You are a superforecaster who uses reference class forecasting for political events. You find the closest historical analogues and apply their outcome frequencies, adjusting only for specific relevant differences. You are humble about your ability to predict but rigorous about base rates.
market_filter:
  include_keywords: ["election", "win", "incumbent", "party", "approval", "majority", "control", "seat", "coalition", "term", "reelect"]
  exclude_keywords: ["sports", "bitcoin", "crypto", "o/u", "weather"]
  price_range:
    - 0.1
    - 0.9
  min_liquidity_usd: 300
  max_days_to_resolve: 60
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
