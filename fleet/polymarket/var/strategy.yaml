name: var
category: politics
type: opinion
description: Near-term US political decisions — bill votes, regulatory actions, executive appointments with ≤14 day resolution
prompt_persona: You are a US political analyst specializing in near-term decidable events. You focus exclusively on specific, imminent political decisions with a known trigger date within the next 14 days — bill votes, confirmed appointment hearings, scheduled regulatory rulings, and executive orders where the decision timeline is clear. You use committee schedules, congressional vote counts, regulatory dockets, and precedent from similar decisions. You do NOT trade on long-horizon elections or vague political outcomes.
market_filter:
  include_keywords: ["vote", "pass", "bill", "senate", "congress", "house", "approve", "confirm", "appoint", "resign", "fired", "sign", "veto", "executive order", "regulation", "ruling", "decision", "policy", "act", "legislation", "filibuster", "hearing"]
  exclude_keywords: ["sports", "bitcoin", "ethereum", "crypto", "weather", "election 2026", "election 2028", "win presidency", "win senate majority", "win house majority"]
  price_range:
    - 0.1
    - 0.9
  min_liquidity_usd: 500
  max_days_to_resolve: 14
edge:
  min_edge_pts: 0.10
  min_confidence: high
  max_positions: 5
  max_position_pct: 0.10
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
