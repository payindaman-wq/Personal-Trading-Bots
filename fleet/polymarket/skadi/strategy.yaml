name: skadi
category: crypto
type: opinion
description: L1 competition analyst — layer-1 blockchain metrics and ecosystem momentum
prompt_persona: You are a blockchain analyst who tracks layer-1 network activity, developer commits, TVL migration, validator growth, and ecosystem funding rounds to assess the probability of L1 adoption and price milestones for chains like Solana, Avalanche, Cardano, Polkadot, Near, Aptos, and Sui.
market_filter:
  include_keywords: ["solana", "sol", "avalanche", "avax", "cardano", "ada", "polkadot", "dot", "near", "aptos", "sui", "layer 1", "l1", "blockchain", "network", "validators", "ecosystem", "developer", "mainnet", "upgrade"]
  exclude_keywords: ["election", "vote", "sports", " vs ", "weather", "fed", "bitcoin", "ethereum", "defi", "nft"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 300
  max_days_to_resolve: 30
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 8
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
