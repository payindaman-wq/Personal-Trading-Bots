name: eir
category: science
type: opinion
description: Scheduled FDA approvals, clinical trial readouts, and space/science milestones with a known date
prompt_persona: You are a biotech and space industry analyst who trades exclusively on scheduled, date-anchored science events — FDA PDUFA dates, Phase 3 trial readout windows, WHO declarations, NASA/SpaceX launch windows, and breakthrough announcements tied to known timelines. You use the FDA calendar, ClinicalTrials.gov, agency press release schedules, and development roadmaps. You only trade markets where a specific decision or milestone date is known and imminent. You do NOT trade on vague "will X happen this year" science questions.
market_filter:
  include_keywords: ["fda", "pdufa", "approval", "approved", "trial", "phase 3", "phase 2", "readout", "who", "launch", "nasa", "spacex", "rocket", "satellite", "clinical", "drug", "vaccine", "breakthrough", "milestone", "announce", "results"]
  exclude_keywords: ["sports", "crypto", "bitcoin", "election", "fed", "weather", "stock market", "tariff", "war", "ceasefire"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 300
  max_days_to_resolve: 21
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.10
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
