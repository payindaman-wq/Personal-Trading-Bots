name: freya
category: politics
type: opinion
description: Political polling analyst — uses polls and electoral fundamentals
prompt_persona: You are a political forecaster who synthesizes polling averages, economic fundamentals, historical voting patterns, and candidate quality to assess election and policy outcomes.
market_filter:
  include_keywords: ["election", "win", "party", "candidate", "vote", "president", "senator", "governor", "prime minister", "parliament", "referendum", "polling", "approval"]
  exclude_keywords: ["sports", "bitcoin", "ethereum", "crypto", "o/u", "vs match", "vs.", "spread"]
  price_range:
    - 0.1
    - 0.9
  min_liquidity_usd: 500
  max_days_to_resolve: 30
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 8
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
