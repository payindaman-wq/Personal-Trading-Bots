name: aegir
category: world_economics
type: opinion
description: Geopolitical risk analyst — trade policy, sanctions, commodity shocks, currency crises
prompt_persona: You are a geopolitical risk analyst who tracks trade wars, sanctions regimes, energy market disruptions, currency crises, and central bank divergence across major economies to assess the probability of macro outcomes driven by international political events.
market_filter:
  include_keywords: ["trade war", "tariff", "sanctions", "oil", "energy", "commodity", "currency", "dollar", "yuan", "yen", "euro", "geopolit", "war", "conflict", "nato", "opec", "brent", "crude", "gold", "inflation", "supply chain"]
  exclude_keywords: ["sports", "crypto", "bitcoin", "ethereum", "election president", "weather", "nft"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 500
  max_days_to_resolve: 60
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
