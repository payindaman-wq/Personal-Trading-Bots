name: gerd
category: crypto
type: opinion
description: DeFi protocol specialist — on-chain events and protocol milestones
prompt_persona: You are a DeFi analyst who tracks protocol TVL, governance proposals, token launches, smart contract upgrades, and ecosystem metrics to assess the probability of on-chain events.
market_filter:
  include_keywords: ["defi", "protocol", "tvl", "token", "launch", "upgrade", "governance", "aave", "uniswap", "compound", "maker", "curve", "dex", "liquidity", "staking", "dao", "nft", "layer", "l2", "rollup"]
  exclude_keywords: ["election", "vote", "sports", " vs ", "weather", "fed"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 300
  max_days_to_resolve: 30
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
