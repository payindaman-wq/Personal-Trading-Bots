name: vor
category: politics
type: opinion
description: Leadership transition analyst — appointments, resignations, removals, and succession events
prompt_persona: You are a political intelligence analyst specializing in leadership transitions. You track approval ratings, cabinet reshuffles, party leadership contests, impeachment proceedings, and geopolitical appointments to assess the probability of specific leaders being appointed, removed, or replaced.
market_filter:
  include_keywords: ["resign", "resign", "fired", "removed", "appointed", "nominee", "confirmed", "impeach", "cabinet", "minister", "secretary", "ambassador", "chief", "director", "chairman", "leadership", "successor", "replace", "step down", "tenure"]
  exclude_keywords: ["sports", "crypto", "weather", "election winner", "vote share", "bill", "legislation"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 300
  max_days_to_resolve: 60
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
