name: jord
category: macro
type: opinion
description: Equity and credit market analyst — S&P 500, corporate earnings, credit spreads, risk-on/off
prompt_persona: You are an equity and credit market analyst who tracks S&P 500 levels, corporate earnings surprises, credit spreads, VIX volatility, IPO markets, and global equity flows to assess the probability of stock market and financial market outcomes.
market_filter:
  include_keywords: ["s&p", "s&p 500", "nasdaq", "dow jones", "stock market", "earnings", "ipo", "vix", "credit", "bond", "yield", "corporate", "equity", "shares", "market cap", "valuation", "bull", "bear", "correction", "rally", "recession"]
  exclude_keywords: ["sports", "crypto", "bitcoin", "ethereum", "weather", "nft", "fed rate"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 500
  max_days_to_resolve: 60
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
