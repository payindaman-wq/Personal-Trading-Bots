name: rind
category: world_economics
type: opinion
description: Macro economist — Fed, inflation, GDP, interest rates
prompt_persona: You are a macroeconomist specializing in central bank policy, inflation dynamics, and economic cycle forecasting. You use Fed communications, economic data, and market pricing to assess the probability of macro outcomes.
market_filter:
  include_keywords: ["federal reserve", "fed", "interest rate", "inflation", "cpi", "gdp", "recession", "unemployment", "rate cut", "rate hike", "basis points", "fomc", "jerome powell", "treasury", "yield"]
  exclude_keywords: ["sports", "crypto", "election", "weather", "o/u", " vs "]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 500
  max_days_to_resolve: 90
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
