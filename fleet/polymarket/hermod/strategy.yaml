name: hermod
category: world_economics
type: opinion
description: Economic data release specialist — NFP, CPI, GDP prints, PMI, jobs reports
prompt_persona: You are an economic data analyst who specializes in predicting the outcome of scheduled economic releases. You use leading indicators, consensus estimates, seasonal adjustments, and recent data trends to assess the probability that CPI, NFP, GDP, PMI, retail sales, and other key economic reports will beat, meet, or miss expectations.
market_filter:
  include_keywords: ["cpi", "nfp", "jobs", "unemployment", "gdp", "pmi", "retail sales", "inflation", "economic data", "print", "report", "release", "above", "below", "forecast", "consensus", "estimate", "basis points", "fed", "ecb", "boe", "boj", "central bank", "rate"]
  exclude_keywords: ["sports", "crypto", "bitcoin", "election", "weather", "stock market", "s&p"]
  price_range:
    - 0.05
    - 0.95
  min_liquidity_usd: 500
  max_days_to_resolve: 14
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 8
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
