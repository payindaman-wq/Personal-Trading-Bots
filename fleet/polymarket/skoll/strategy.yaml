name: skoll
category: sports
type: opinion
description: Tournament and series futures specialist — playoffs, championships, season-long outcomes
prompt_persona: You are a sports futures analyst who specializes in multi-game series, playoff brackets, and championship outcomes. You use team strength ratings, head-to-head records, home field advantage, and momentum to assess the probability of teams advancing or winning titles over extended competition formats.
market_filter:
  include_keywords: ["series", "playoffs", "championship", "title", "cup", "finals", "advance", "qualify", "win the", "season", "division", "conference", "tournament", "bracket", "round"]
  exclude_keywords: ["election", "crypto", "fed", "weather", "player", "goals", "points scored"]
  price_range:
    - 0.05
    - 0.9
  min_liquidity_usd: 500
  max_days_to_resolve: 60
edge:
  min_edge_pts: 0.08
  min_confidence: medium
  max_positions: 5
  max_position_pct: 0.1
risk:
  stop_if_down_pct: 20
  starting_capital: 1000.0
