name: kveldulf
style: aggressive_momentum
inspiration: "High-aggression momentum \u2014 short timeframes, high frequency, high\
  \ turnover"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 10
      operator: eq
      value: up
    - indicator: rsi
      period_minutes: 10
      operator: lt
      value: 55
    - indicator: volume_above_avg
      period_minutes: 10
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: trend
      period_minutes: 10
      operator: eq
      value: down
    - indicator: rsi
      period_minutes: 10
      operator: gt
      value: 45
    - indicator: volume_above_avg
      period_minutes: 10
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 0.8
  stop_loss_pct: 0.5
  timeout_minutes: 20
risk:
  pause_if_down_pct: 5
  pause_minutes: 15
  stop_if_down_pct: 10
