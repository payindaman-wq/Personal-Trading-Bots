name: brandr
style: momentum_scalper
inspiration: "Aggressive momentum scalper with 2x leverage — rides strong trends, exits fast"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 8
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 15
      operator: eq
      value: up
    - indicator: rsi
      period_minutes: 20
      operator: lt
      value: 55
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: trend
      period_minutes: 15
      operator: eq
      value: down
    - indicator: rsi
      period_minutes: 20
      operator: gt
      value: 45
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.6
  timeout_minutes: 45
risk:
  pause_if_down_pct: 4
  pause_minutes: 20
  stop_if_down_pct: 10
