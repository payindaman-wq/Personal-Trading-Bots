name: helgi
style: multi_signal_conservative
inspiration: "Conservative multi-signal \u2014 requires trend + momentum + RSI alignment"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 120
      operator: eq
      value: up
    - indicator: momentum_accelerating
      period_minutes: 60
      operator: eq
      value: true
    - indicator: rsi
      period_minutes: 30
      operator: lt
      value: 60
  short:
    conditions:
    - indicator: trend
      period_minutes: 120
      operator: eq
      value: down
    - indicator: momentum_accelerating
      period_minutes: 60
      operator: eq
      value: true
    - indicator: rsi
      period_minutes: 30
      operator: gt
      value: 40
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 1.2
  timeout_minutes: 120
risk:
  pause_if_down_pct: 5
  pause_minutes: 45
  stop_if_down_pct: 10
