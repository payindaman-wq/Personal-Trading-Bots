name: vikar
style: mean_reversion
inspiration: "Mean reversion \u2014 buys oversold dips, sells overbought bounces with\
  \ leverage"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 5
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 25
    - indicator: price_change_pct
      period_minutes: 30
      operator: lt
      value: -1.0
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 75
    - indicator: price_change_pct
      period_minutes: 30
      operator: gt
      value: 1.0
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 0.8
  stop_loss_pct: 0.5
  timeout_minutes: 30
risk:
  pause_if_down_pct: 3
  pause_minutes: 15
  stop_if_down_pct: 8
