name: vikar
style: mean_reversion
inspiration: "Mean reversion \u2014 buys oversold dips, sells overbought bounces with\
  \ leverage"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 32
    - indicator: price_change_pct
      period_minutes: 30
      operator: lt
      value: -1.5
  short:
    conditions:
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 68
    - indicator: price_change_pct
      period_minutes: 30
      operator: gt
      value: 1.5
exit:
  take_profit_pct: 1.2
  stop_loss_pct: 0.8
  timeout_minutes: 45
risk:
  pause_if_down_pct: 5
  pause_minutes: 30
  stop_if_down_pct: 12
