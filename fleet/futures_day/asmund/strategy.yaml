name: asmund
style: macd_crossover
inspiration: "MACD crossover with RSI confirmation — medium holding times"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 8
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: macd_signal
      period_minutes: 15
      operator: eq
      value: bullish
    - indicator: rsi
      period_minutes: 21
      operator: lt
      value: 50
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: macd_signal
      period_minutes: 15
      operator: eq
      value: bearish
    - indicator: rsi
      period_minutes: 21
      operator: gt
      value: 50
    - indicator: volume_above_avg
      period_minutes: 15
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 1.2
  stop_loss_pct: 0.7
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 20
  stop_if_down_pct: 10
