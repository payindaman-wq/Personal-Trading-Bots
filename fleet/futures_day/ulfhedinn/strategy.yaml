name: ulfhedinn
style: contrarian
inspiration: "Contrarian \u2014 fades strong moves, bets on exhaustion with MACD divergence"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bullish
    - indicator: price_change_pct
      period_minutes: 60
      operator: lt
      value: -2.0
  short:
    conditions:
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bearish
    - indicator: price_change_pct
      period_minutes: 60
      operator: gt
      value: 2.0
exit:
  take_profit_pct: 1.5
  stop_loss_pct: 1.0
  timeout_minutes: 90
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 12
