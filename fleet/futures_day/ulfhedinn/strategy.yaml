name: ulfhedinn
style: contrarian
inspiration: "Contrarian — fades strong moves, bets on exhaustion with MACD divergence"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 5
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bullish
    - indicator: price_change_pct
      period_minutes: 60
      operator: lt
      value: -2.0
    - indicator: rsi
      period_minutes: 60
      operator: lt
      value: 30
    - indicator: volume_above_avg
      period_minutes: 60
      operator: gt
      value: 1.0
  short:
    conditions:
    - indicator: macd_signal
      period_minutes: 60
      operator: eq
      value: bearish
    - indicator: price_change_pct
      period_minutes: 60
      operator: gt
      value: 2.0
    - indicator: rsi
      period_minutes: 60
      operator: gt
      value: 70
    - indicator: volume_above_avg
      period_minutes: 60
      operator: gt
      value: 1.0
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.75
  timeout_minutes: 60
risk:
  pause_if_down_pct: 3
  pause_minutes: 30
  stop_if_down_pct: 8
