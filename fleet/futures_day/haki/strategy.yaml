name: haki
style: trend_momentum_long_bias
inspiration: "Trend momentum with slight long bias \u2014 goes short only on strong\
  \ signals"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 12
  max_open: 3
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 30
      operator: eq
      value: up
    - indicator: rsi
      period_minutes: 15
      operator: lt
      value: 65
  short:
    conditions:
    - indicator: trend
      period_minutes: 30
      operator: eq
      value: down
    - indicator: rsi
      period_minutes: 15
      operator: gt
      value: 65
    - indicator: momentum_accelerating
      period_minutes: 15
      operator: eq
      value: true
exit:
  take_profit_pct: 1.8
  stop_loss_pct: 0.9
  timeout_minutes: 75
risk:
  pause_if_down_pct: 5
  pause_minutes: 30
  stop_if_down_pct: 12
