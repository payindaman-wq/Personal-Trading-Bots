name: orvar
style: rsi_reversal
inspiration: "RSI reversal specialist \u2014 extreme readings only, tight exits"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 8
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 25
      operator: lt
      value: 25
    - indicator: volume_above_avg
      period_minutes: 25
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: rsi
      period_minutes: 25
      operator: gt
      value: 75
    - indicator: volume_above_avg
      period_minutes: 25
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.8
  timeout_minutes: 45
risk:
  pause_if_down_pct: 4
  pause_minutes: 20
  stop_if_down_pct: 10
