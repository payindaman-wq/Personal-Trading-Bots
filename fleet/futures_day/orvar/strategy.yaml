name: orvar
style: rsi_reversal
inspiration: "RSI reversal specialist \u2014 extreme readings only, tight exits"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 25
      operator: lt
      value: 28
  short:
    conditions:
    - indicator: rsi
      period_minutes: 25
      operator: gt
      value: 72
exit:
  take_profit_pct: 1.8
  stop_loss_pct: 1.2
  timeout_minutes: 60
risk:
  pause_if_down_pct: 5
  pause_minutes: 30
  stop_if_down_pct: 12
