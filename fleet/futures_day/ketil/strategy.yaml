name: ketil
style: trend_follower
inspiration: "Trend follower \u2014 enters on confirmed trend with momentum acceleration"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 60
      operator: eq
      value: up
    - indicator: momentum_accelerating
      period_minutes: 30
      operator: eq
      value: true
  short:
    conditions:
    - indicator: trend
      period_minutes: 60
      operator: eq
      value: down
    - indicator: momentum_accelerating
      period_minutes: 30
      operator: eq
      value: true
exit:
  take_profit_pct: 2.0
  stop_loss_pct: 1.0
  timeout_minutes: 90
risk:
  pause_if_down_pct: 5
  pause_minutes: 45
  stop_if_down_pct: 12
