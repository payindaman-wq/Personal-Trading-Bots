name: hakon
style: multi_timeframe
inspiration: "Multi-timeframe \u2014 short term entry aligned with medium term trend"
league: futures_day
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 8
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: macd_signal
      period_minutes: 30
      operator: eq
      value: bullish
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 70
    - indicator: volume_above_avg
      period_minutes: 20
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: macd_signal
      period_minutes: 30
      operator: eq
      value: bearish
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 30
    - indicator: volume_above_avg
      period_minutes: 20
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 1.5
  stop_loss_pct: 0.8
  timeout_minutes: 90
risk:
  pause_if_down_pct: 4
  pause_minutes: 30
  stop_if_down_pct: 10
