name: bjarne
style: wide_net_momentum
inspiration: Credible Crypto -- casts wide net for momentum across entire market, small positions, high volume
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 55
      - indicator: volume_above_avg
        period_minutes: 35
        operator: gt
        value: 1.2
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 45
      - indicator: volume_above_avg
        period_minutes: 35
        operator: gt
        value: 1.2
exit:
  take_profit_pct: 0.35
  stop_loss_pct: 0.2
  timeout_minutes: 30
risk:
  pause_if_down_pct: 3
  pause_minutes: 30
  stop_if_down_pct: 7
