name: harald
style: rsi_mean_reversion
inspiration: Scott Melker -- RSI pullback within confirmed trend, buys when short-term RSI oversold but macro direction intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 35
      operator: lt
      value: 30
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - up
      - flat
    - indicator: price_vs_vwap
      operator: in
      value:
      - below
      - at
    - indicator: volume_above_avg
      period_minutes: 35
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: rsi
      period_minutes: 35
      operator: gt
      value: 70
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - down
      - flat
    - indicator: price_vs_vwap
      operator: in
      value:
      - above
      - at
    - indicator: volume_above_avg
      period_minutes: 35
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 0.4
  stop_loss_pct: 0.4
  timeout_minutes: 45
risk:
  pause_if_down_pct: 3
  pause_minutes: 30
  stop_if_down_pct: 6
