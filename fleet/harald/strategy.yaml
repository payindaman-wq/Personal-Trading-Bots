name: harald
style: rsi_trend_composite
inspiration: Scott Melker -- RSI and trend confluence with strict risk-first approach, never fights confirmed direction, waits for high-probability setups
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 53
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 63
      - indicator: trend
        period_minutes: 30
        operator: eq
        value: up
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
      - indicator: price_vs_vwap
        operator: in
        value: [above, at]
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
  short:
    conditions:
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 47
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 37
      - indicator: trend
        period_minutes: 30
        operator: eq
        value: down
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
      - indicator: price_vs_vwap
        operator: in
        value: [below, at]
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
exit:
  take_profit_pct: 1.2
  stop_loss_pct: 0.4
  timeout_minutes: 60
risk:
  pause_if_down_pct: 3
  pause_minutes: 60
  stop_if_down_pct: 7
