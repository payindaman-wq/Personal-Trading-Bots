name: harald
style: rsi_mean_reversion
inspiration: Scott Melker -- RSI pullback within confirmed trend, buys when short-term RSI oversold but macro direction intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: rsi
      period_minutes: 35
      operator: lt
      value: 35
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - up
      - flat
    - indicator: price_vs_vwap
      operator: in
      value:
      - below
      - at
  short:
    conditions:
    - indicator: rsi
      period_minutes: 35
      operator: gt
      value: 65
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - down
      - flat
    - indicator: price_vs_vwap
      operator: in
      value:
      - above
      - at
exit:
  take_profit_pct: 0.5
  stop_loss_pct: 0.3
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
