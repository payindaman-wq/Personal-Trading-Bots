name: astrid
style: rsi_mean_reversion
inspiration: Crypto Jebb -- fades overextended moves at extreme RSI levels with Bollinger Band confirmation
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 28
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: below_lower
      - indicator: trend
        period_minutes: 60
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 72
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: above_upper
      - indicator: trend
        period_minutes: 60
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 3.0
  stop_loss_pct: 0.9
  timeout_minutes: 150
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
