name: astrid
style: bollinger_squeeze_trend
inspiration: CryptoCred -- enters during BB compression with trend alignment, positioned
  for expansion
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: bollinger_position
      period_minutes: 100
      operator: eq
      value: inside
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bullish
  short:
    conditions:
    - indicator: bollinger_position
      period_minutes: 100
      operator: eq
      value: inside
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bearish
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 0.7
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
