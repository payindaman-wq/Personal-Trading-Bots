name: astrid
style: rsi_mean_reversion_scalper
inspiration: Crypto Jebb -- fades overextended moves using dual-timeframe RSI, buys deep pullbacks in uptrends near VWAP support
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
position:
  size_pct: 20
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 33
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 45
      - indicator: trend
        period_minutes: 60
        operator: in
        value: [up, flat]
      - indicator: price_vs_vwap
        operator: in
        value: [below, at]
      - indicator: macd_signal
        period_minutes: 130
        operator: in
        value: [bullish, neutral]
  short:
    conditions:
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 67
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 55
      - indicator: trend
        period_minutes: 60
        operator: in
        value: [down, flat]
      - indicator: price_vs_vwap
        operator: in
        value: [above, at]
      - indicator: macd_signal
        period_minutes: 130
        operator: in
        value: [bearish, neutral]
exit:
  take_profit_pct: 1.2
  stop_loss_pct: 0.45
  timeout_minutes: 55
risk:
  pause_if_down_pct: 4
  pause_minutes: 30
  stop_if_down_pct: 10
