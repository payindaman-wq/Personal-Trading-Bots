name: ragnar
style: vwap_reclaim
inspiration: VWAP reclaim -- price dips below VWAP then reclaims it, enter on the reclaim with VWAP as support, quality setups only
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 50
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 67
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 50
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 33
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.4
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
