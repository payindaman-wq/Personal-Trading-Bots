name: ragnar
style: vwap_reclaim
inspiration: VWAP reclaim -- VWAP + RSI sweet spot + MACD direction all must agree, quality over quantity
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 52
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 65
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 48
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 35
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.4
  timeout_minutes: 45
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
