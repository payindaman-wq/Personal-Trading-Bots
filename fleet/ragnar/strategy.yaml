name: ragnar
style: vwap_pullback_buyer
inspiration: VWAP reclaim -- buys dips to VWAP in uptrending markets with MACD confirmation
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - below
      - at
    - indicator: trend
      period_minutes: 240
      operator: in
      value:
      - up
    - indicator: rsi
      period_minutes: 35
      operator: lt
      value: 40
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bullish
    - indicator: volume_above_avg
      period_minutes: 60
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - above
      - at
    - indicator: trend
      period_minutes: 240
      operator: in
      value:
      - down
    - indicator: rsi
      period_minutes: 35
      operator: gt
      value: 60
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bearish
    - indicator: volume_above_avg
      period_minutes: 60
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 0.7
  stop_loss_pct: 0.4
  timeout_minutes: 45
risk:
  pause_if_down_pct: 3
  pause_minutes: 30
  stop_if_down_pct: 6
