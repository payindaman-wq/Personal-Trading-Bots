name: ragnar
style: vwap_reclaim
inspiration: VWAP reclaim -- price dips below VWAP then reclaims it, enter on the reclaim with VWAP as support
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
  - LINK/USD
position:
  size_pct: 22
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: in
        value: [above, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [up, flat]
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 40
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 58
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: in
        value: [below, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [down, flat]
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 60
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 42
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 2.0
  stop_loss_pct: 0.6
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
