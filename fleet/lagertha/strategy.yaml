name: lagertha
style: vwap_trend_directional
inspiration: TheWhiteWhaleHL -- VWAP-anchored directional conviction trades, buys pullbacks to VWAP with macro trend confirmation
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 18
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - below
      - at
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - up
      - flat
    - indicator: rsi
      period_minutes: 35
      operator: lt
      value: 40
    - indicator: volume_above_avg
      period_minutes: 35
      operator: gt
      value: 1.2
  short:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - above
      - at
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - down
      - flat
    - indicator: rsi
      period_minutes: 35
      operator: gt
      value: 60
    - indicator: volume_above_avg
      period_minutes: 35
      operator: gt
      value: 1.2
exit:
  take_profit_pct: 0.5
  stop_loss_pct: 0.4
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 45
  stop_if_down_pct: 8
