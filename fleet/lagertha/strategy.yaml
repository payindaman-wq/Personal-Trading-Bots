name: lagertha
style: vwap_trend_directional
inspiration: TheWhiteWhaleHL -- VWAP-anchored directional conviction trades, buys
  pullbacks to VWAP with macro trend confirmation
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - below
      - at
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - up
      - flat
    - indicator: rsi
      period_minutes: 35
      operator: lt
      value: 42
  short:
    conditions:
    - indicator: price_vs_vwap
      operator: in
      value:
      - above
      - at
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: trend
      period_minutes: 60
      operator: in
      value:
      - down
      - flat
    - indicator: rsi
      period_minutes: 35
      operator: gt
      value: 58
exit:
  take_profit_pct: 2.8
  stop_loss_pct: 0.8
  timeout_minutes: 150
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
