name: floki
style: multi_tf_confluence_scalper
inspiration: Daan Crypto Trades -- multi-TF RSI pullback to EMA in trending markets, buys the snapback when short-term dips within macro uptrend
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 35
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [down, flat]
  short:
    conditions:
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 65
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [up, flat]
exit:
  take_profit_pct: 2.2
  stop_loss_pct: 0.7
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
