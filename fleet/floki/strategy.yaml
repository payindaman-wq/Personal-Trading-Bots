name: floki
style: momentum_scalper
inspiration: Daan Crypto Trades -- fast momentum scalps, rides short-term trends with tight risk management
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 10
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_minutes: 30
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 55
      - indicator: volume_above_avg
        period_minutes: 15
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_minutes: 30
        operator: eq
        value: true
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 45
      - indicator: volume_above_avg
        period_minutes: 15
        operator: eq
        value: true
exit:
  take_profit_pct: 0.3
  stop_loss_pct: 0.25
  timeout_minutes: 20
risk:
  pause_if_down_pct: 3
  pause_minutes: 20
  stop_if_down_pct: 6
