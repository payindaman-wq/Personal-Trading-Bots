name: floki
style: multi_tf_confluence_scalper
inspiration: Daan Crypto Trades -- multi-TF RSI pullback to EMA in trending markets, scalps the snapback with tight risk
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - AVAX/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 42
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
      - indicator: trend
        period_minutes: 30
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
  short:
    conditions:
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 58
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
      - indicator: trend
        period_minutes: 30
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_minutes: 60
        operator: eq
        value: true
exit:
  take_profit_pct: 1.0
  stop_loss_pct: 0.35
  timeout_minutes: 40
risk:
  pause_if_down_pct: 3
  pause_minutes: 60
  stop_if_down_pct: 6
