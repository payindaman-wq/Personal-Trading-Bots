name: bjorn
style: ema_macd_momentum
inspiration: Crypto Tony -- EMA trend direction confirmed by MACD, only trades pullbacks in the direction of momentum
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 20
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 50
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 68
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
  short:
    conditions:
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 50
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 32
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
exit:
  take_profit_pct: 1.5
  stop_loss_pct: 0.5
  timeout_minutes: 90
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 8
