name: bjorn
style: ema_trend_continuation
inspiration: Crypto Tony -- EMA trend direction with MACD momentum, rides pullbacks to EMA support
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
    - indicator: price_vs_ema
      period_minutes: 50
      operator: eq
      value: above
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: up
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bullish
    - indicator: rsi
      period_minutes: 14
      operator: gt
      value: 40
    - indicator: volume_above_avg
      period_minutes: 20
      operator: eq
      value: true
  short:
    conditions:
    - indicator: price_vs_ema
      period_minutes: 50
      operator: eq
      value: below
    - indicator: trend
      period_minutes: 240
      operator: eq
      value: down
    - indicator: macd_signal
      period_minutes: 130
      operator: eq
      value: bearish
    - indicator: rsi
      period_minutes: 14
      operator: lt
      value: 60
    - indicator: volume_above_avg
      period_minutes: 20
      operator: eq
      value: true
exit:
  take_profit_pct: 0.5
  stop_loss_pct: 0.4
  timeout_minutes: 60
risk:
  pause_if_down_pct: 3
  pause_minutes: 30
  stop_if_down_pct: 6
