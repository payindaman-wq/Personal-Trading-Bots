name: ulf
style: breakout_retest
inspiration: The Trading Rush -- waits for breakout then buys the retest pullback, enters as price pulls back toward EMA support
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - LINK/USD
  - NEAR/USD
  - SUI/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: in
        value: [above, at]
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [down, flat]
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 45
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: in
        value: [below, at]
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
      - indicator: trend
        period_minutes: 15
        operator: in
        value: [up, flat]
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 55
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
exit:
  take_profit_pct: 2.0
  stop_loss_pct: 0.6
  timeout_minutes: 90
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10
