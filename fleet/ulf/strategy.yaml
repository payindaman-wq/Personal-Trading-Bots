name: ulf
style: vwap_ema_confluence
inspiration: The Trading Rush -- confluence of VWAP and EMA creates high-probability entries at support/resistance
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 22
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [below, at]
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 35
        operator: lt
        value: 50
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: price_vs_ema
        period_minutes: 50
        operator: in
        value: [above, at]
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 35
        operator: gt
        value: 50
exit:
  take_profit_pct: 2.5
  stop_loss_pct: 0.7
  timeout_minutes: 120
risk:
  pause_if_down_pct: 4
  pause_minutes: 60
  stop_if_down_pct: 10
