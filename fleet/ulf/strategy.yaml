name: ulf
style: breakout_retest_scalper
inspiration: The Trading Rush -- waits for breakout above VWAP/EMA then trades the retest, price must be back inside BBs confirming the pullback
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - LINK/USD
  - NEAR/USD
  - SUI/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: above
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: up
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 48
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 64
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
  short:
    conditions:
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: below
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: down
      - indicator: rsi
        period_minutes: 70
        operator: lt
        value: 52
      - indicator: rsi
        period_minutes: 70
        operator: gt
        value: 36
      - indicator: bollinger_position
        period_minutes: 100
        operator: eq
        value: inside
exit:
  take_profit_pct: 1.6
  stop_loss_pct: 0.5
  timeout_minutes: 60
risk:
  pause_if_down_pct: 4
  pause_minutes: 45
  stop_if_down_pct: 10
