name: gunnar
style: aggressive_dip_buyer
inspiration: Gainzy -- catches sharp dips with conviction sizing, enters extreme oversold conditions when macro trend still intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: lt
        value: -1.0
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 28
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: gt
        value: 1.0
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 72
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 3.0
  stop_loss_pct: 1.0
  timeout_minutes: 120
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 12
