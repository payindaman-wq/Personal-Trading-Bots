name: gunnar
style: aggressive_dip_buyer
inspiration: Gainzy -- catches sharp dips with conviction, enters extreme oversold conditions when macro trend intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 18
  max_open: 3
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: lt
        value: -0.4
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 35
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: gt
        value: 0.4
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 65
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 0.55
  stop_loss_pct: 0.3
  timeout_minutes: 60
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
