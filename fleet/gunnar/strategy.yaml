name: gunnar
style: aggressive_dip_buyer
inspiration: Gainzy -- catches sharp dips with conviction, enters extreme oversold conditions when macro trend intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: lt
        value: -0.4
      - indicator: rsi
        period_minutes: 25
        operator: lt
        value: 30
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [up, flat]
      - indicator: volume_above_avg
        period_minutes: 15
        operator: gt
        value: 1.2
  short:
    conditions:
      - indicator: price_change_pct
        period_minutes: 30
        operator: gt
        value: 0.4
      - indicator: rsi
        period_minutes: 25
        operator: gt
        value: 70
      - indicator: trend
        period_minutes: 240
        operator: in
        value: [down, flat]
      - indicator: volume_above_avg
        period_minutes: 15
        operator: gt
        value: 1.2
exit:
  take_profit_pct: 0.5
  stop_loss_pct: 0.4
  timeout_minutes: 45
risk:
  pause_if_down_pct: 4
  pause_minutes: 30
  stop_if_down_pct: 8
