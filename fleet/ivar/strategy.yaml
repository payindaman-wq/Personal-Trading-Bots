name: ivar
style: high_conviction_momentum
inspiration: James Wynn (de-leveraged) -- enters only when trend is locked in across 3 timeframes, wide TP to justify waiting for perfect setup
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - DOGE/USD
  - AVAX/USD
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: up
      - indicator: trend
        period_minutes: 60
        operator: eq
        value: up
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bullish
  short:
    conditions:
      - indicator: trend
        period_minutes: 15
        operator: eq
        value: down
      - indicator: trend
        period_minutes: 60
        operator: eq
        value: down
      - indicator: trend
        period_minutes: 240
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_minutes: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_minutes: 130
        operator: eq
        value: bearish
exit:
  take_profit_pct: 3.0
  stop_loss_pct: 0.8
  timeout_minutes: 180
risk:
  pause_if_down_pct: 5
  pause_minutes: 60
  stop_if_down_pct: 10
