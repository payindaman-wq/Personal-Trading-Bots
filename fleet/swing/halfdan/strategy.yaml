name: halfdan
style: bollinger_breakout_expansion
inspiration: CryptoCred -- trades BB breakout expansion with momentum confirmation
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 52
  short:
    conditions:
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 48
exit:
  take_profit_pct: 12.0
  stop_loss_pct: 4.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
