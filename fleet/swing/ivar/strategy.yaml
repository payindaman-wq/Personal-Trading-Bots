name: ivar
style: narrative_momentum_swing
inspiration: chris-crypto (full discretion) -- broadest mandate, seeks strongest momentum across the altcoin landscape, macro-aware, large asymmetric targets

pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
  - AAVE/USD
  - NEAR/USD
  - SUI/USD

position:
  size_pct: 28
  max_open: 3
  fee_rate: 0.001

entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: in
        value: [up, flat]
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 45
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 70
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: in
        value: [down, flat]
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 55
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 30

exit:
  take_profit_pct: 15.0
  stop_loss_pct: 5.0
  timeout_hours: 168

risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
