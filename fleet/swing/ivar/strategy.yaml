name: ivar
style: aggressive_alt_momentum
inspiration: chris-crypto (full discretion) -- broadest mandate, seeks strongest momentum across altcoin landscape, large targets
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
  - SUI/USD
  - NEAR/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 62
  short:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 38
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 3.0
  timeout_hours: 168
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
