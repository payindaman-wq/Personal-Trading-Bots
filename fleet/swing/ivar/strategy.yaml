name: ivar
style: aggressive_alt_momentum
inspiration: broad mandate altcoin momentum
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - AVAX/USD
  - LINK/USD
  - SUI/USD
  - NEAR/USD
position:
  size_pct: 10
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 60
      - indicator: volume_above_avg
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 40
      - indicator: volume_above_avg
        operator: eq
        value: true
exit:
  take_profit_pct: 4.0
  stop_loss_pct: 5.0
  timeout_hours: 168
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
