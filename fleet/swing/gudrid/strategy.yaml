name: gudrid
style: momentum_continuation
inspiration: Coin Bureau -- rides established momentum, diversified across strong pairs
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 18
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 65
      - indicator: volume_above_avg
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 35
      - indicator: volume_above_avg
        operator: eq
        value: true
exit:
  take_profit_pct: 12.0
  stop_loss_pct: 5.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 7
  pause_hours: 24
  stop_if_down_pct: 16
