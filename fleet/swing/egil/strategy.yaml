name: egil
style: weekly_trend_follower
inspiration: Benjamin Cowen -- only trades with macro direction, extremely patient, waits for structure to confirm
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 65
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 35
exit:
  take_profit_pct: 10.0
  stop_loss_pct: 6.0
  timeout_hours: 144
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
