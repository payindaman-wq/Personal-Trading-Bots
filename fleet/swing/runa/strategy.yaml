name: runa
style: swing_contrarian_reversal
inspiration: Tone Vays -- extreme patience, contrarian, only enters on deep multi-day capitulation or euphoria
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 30
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 28
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: price_change_pct
        period_hours: 72
        operator: lt
        value: -5.0
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 72
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: price_change_pct
        period_hours: 72
        operator: gt
        value: 5.0
exit:
  take_profit_pct: 10.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 7
  pause_hours: 48
  stop_if_down_pct: 16
