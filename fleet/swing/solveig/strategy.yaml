name: solveig
style: multi_day_mean_reversion
inspiration: Crypto Jebb (swing timeframe) -- fades extreme multi-day moves, buys deep RSI dips near BB lower band when macro trend intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
position:
  size_pct: 22
  max_open: 3
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 35
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: trend
        period_hours: 168
        operator: in
        value: [up, flat]
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 65
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: trend
        period_hours: 168
        operator: in
        value: [down, flat]
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 2.5
  timeout_hours: 96
risk:
  pause_if_down_pct: 6
  pause_hours: 24
  stop_if_down_pct: 15
