name: solveig
style: multi_day_mean_reversion
inspiration: Crypto Jebb (swing timeframe) -- fades extreme multi-day moves, buys deep RSI dips when longer trend remains intact
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 32
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: trend
        period_hours: 168
        operator: in
        value: ["up", "flat"]
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 68
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: trend
        period_hours: 168
        operator: in
        value: ["down", "flat"]
exit:
  take_profit_pct: 5.0
  stop_loss_pct: 2.0
  timeout_hours: 72
risk:
  pause_if_down_pct: 6
  pause_hours: 24
  stop_if_down_pct: 15
