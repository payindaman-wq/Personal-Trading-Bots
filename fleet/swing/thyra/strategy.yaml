name: thyra
style: altcoin_momentum_rotation
inspiration: Altcoin Daily -- catches altcoin breakouts when momentum accelerates, trades mid-caps showing trending strength
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - SUI/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 60
      - indicator: volume_above_avg
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 40
      - indicator: volume_above_avg
        operator: eq
        value: true
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 6.0
  timeout_hours: 168
risk:
  pause_if_down_pct: 8
  pause_hours: 24
  stop_if_down_pct: 18
