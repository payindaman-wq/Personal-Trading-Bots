name: thyra
style: altcoin_momentum_rotation
inspiration: Altcoin Daily -- catches altcoin breakouts when momentum accelerates, trades mid-caps showing trending strength
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 20
  max_open: 3
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: price_vs_vwap
        operator: eq
        value: above
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 68
  short:
    conditions:
      - indicator: trend
        period_hours: 72
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: price_vs_vwap
        operator: eq
        value: below
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 32
exit:
  take_profit_pct: 12.0
  stop_loss_pct: 4.0
  timeout_hours: 96
risk:
  pause_if_down_pct: 8
  pause_hours: 24
  stop_if_down_pct: 18
