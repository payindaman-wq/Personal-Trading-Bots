name: orm
style: macro_pullback_buyer
inspiration: InvestAnswers -- data-driven macro investor, buys controlled pullbacks in established uptrends
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
position:
  size_pct: 22
  max_open: 3
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 24
        operator: in
        value: [down, flat]
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 42
      - indicator: price_vs_ema
        period_hours: 50
        operator: in
        value: [below, at]
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 24
        operator: in
        value: [up, flat]
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 58
      - indicator: price_vs_ema
        period_hours: 50
        operator: in
        value: [above, at]
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 6
  pause_hours: 24
  stop_if_down_pct: 15
