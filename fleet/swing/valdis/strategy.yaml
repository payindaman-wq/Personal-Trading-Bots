name: valdis
style: weekly_structure_breakout
inspiration: Rekt Capital -- trades weekly level breakouts with BB expansion confirmation, high conviction
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - AAVE/USD
  - NEAR/USD
  - SUI/USD
position:
  size_pct: 28
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 24
        operator: eq
        value: up
      - indicator: price_change_pct
        period_hours: 24
        operator: gt
        value: 1.5
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 24
        operator: eq
        value: down
      - indicator: price_change_pct
        period_hours: 24
        operator: lt
        value: -1.5
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
exit:
  take_profit_pct: 12.0
  stop_loss_pct: 4.0
  timeout_hours: 144
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
