name: valdis
style: weekly_structure_breakout
inspiration: Rekt Capital -- trades weekly level breakouts with BB expansion confirmation, high conviction
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - DOGE/USD
  - AVAX/USD
  - LINK/USD
  - UNI/USD
  - AAVE/USD
  - NEAR/USD
  - APT/USD
  - SUI/USD
  - ARB/USD
  - OP/USD
  - ADA/USD
  - POL/USD
position:
  size_pct: 25
  max_open: 2
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 24
        operator: eq
        value: up
      - indicator: price_change_pct
        period_hours: 24
        operator: gt
        value: 1.0
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: volume_above_avg
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 24
        operator: eq
        value: down
      - indicator: price_change_pct
        period_hours: 24
        operator: lt
        value: -1.0
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: volume_above_avg
        operator: eq
        value: true
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 5.0
  timeout_hours: 168
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
