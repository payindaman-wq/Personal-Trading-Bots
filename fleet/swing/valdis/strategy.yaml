name: valdis
style: weekly_structure_breakout
inspiration: Rekt Capital -- trades weekly level breakouts with BB expansion confirmation, high conviction, wide targets
pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD
position:
  size_pct: 35
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: up
      - indicator: trend
        period_hours: 24
        operator: eq
        value: up
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: above
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bullish
      - indicator: price_change_pct
        period_hours: 24
        operator: gt
        value: 1.5
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 72
  short:
    conditions:
      - indicator: trend
        period_hours: 168
        operator: eq
        value: down
      - indicator: trend
        period_hours: 24
        operator: eq
        value: down
      - indicator: price_vs_ema
        period_hours: 50
        operator: eq
        value: below
      - indicator: macd_signal
        period_hours: 26
        operator: eq
        value: bearish
      - indicator: price_change_pct
        period_hours: 24
        operator: lt
        value: -1.5
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 28
exit:
  take_profit_pct: 10.0
  stop_loss_pct: 3.5
  timeout_hours: 168
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
