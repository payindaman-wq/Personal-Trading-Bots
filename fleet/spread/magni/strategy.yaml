name: magni
style: near_sol_spread_momentum
inspiration: NEAR/SOL ratio trends when ecosystem attention shifts -- ride momentum in alt L1 competition
pairs:
  - NEAR/USD
spread:
  base: NEAR/USD
  quote: SOL/USD
  analysis_pair: NEAR_SOL_RATIO
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 48
        operator: eq
        value: up
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 65
  short:
    conditions:
      - indicator: trend
        period_hours: 48
        operator: eq
        value: down
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 35
exit:
  take_profit_pct: 10.0
  stop_loss_pct: 4.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 10
  pause_hours: 48
  stop_if_down_pct: 22
