name: thordis
style: doge_btc_spread_mean_reversion
inspiration: DOGE/BTC ratio mean reverts after meme pumps -- buy when DOGE underperforms, sell when overextended
pairs:
  - DOGE/USD
spread:
  base: DOGE/USD
  quote: BTC/USD
  analysis_pair: DOGE_BTC_RATIO
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 32
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 68
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
exit:
  take_profit_pct: 10.0
  stop_loss_pct: 4.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 10
  pause_hours: 48
  stop_if_down_pct: 22
