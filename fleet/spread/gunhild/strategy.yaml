name: gunhild
style: avax_eth_spread_momentum
inspiration: Mirror of forseti -- same momentum logic on AVAX/ETH ratio instead of SOL/ETH
pairs:
  - AVAX/USD
spread:
  base: AVAX/USD
  quote: ETH/USD
  analysis_pair: AVAX_ETH_RATIO
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: trend
        period_hours: 48
        operator: eq
        value: up
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 42
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 62
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
  short:
    conditions:
      - indicator: trend
        period_hours: 48
        operator: eq
        value: down
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 58
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 38
      - indicator: momentum_accelerating
        period_hours: 48
        operator: eq
        value: true
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 9
  pause_hours: 48
  stop_if_down_pct: 20
