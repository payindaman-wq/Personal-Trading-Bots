name: herdis
style: avax_sol_spread_mean_reversion
inspiration: L1/L1 pair -- AVAX and SOL are competing smart contract platforms with correlated but divergent narratives, ratio should mean revert as capital rotates between them
pairs:
  - AVAX/USD
spread:
  base: AVAX/USD
  quote: SOL/USD
  analysis_pair: AVAX_SOL_RATIO
position:
  size_pct: 30
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 32
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: trend
        period_hours: 168
        operator: in
        value: [flat, down]
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 68
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: trend
        period_hours: 168
        operator: in
        value: [flat, up]
exit:
  take_profit_pct: 6.0
  stop_loss_pct: 2.5
  timeout_hours: 96
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
