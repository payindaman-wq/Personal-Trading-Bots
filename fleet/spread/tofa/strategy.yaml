name: tofa
style: eth_btc_dual_confirmation
inspiration: Refined skadi -- only long ETH when ratio is oversold AND ETH absolute price stabilizing
pairs:
  - ETH/USD
spread:
  base: ETH/USD
  quote: BTC/USD
  analysis_pair: ETH_BTC_RATIO
position:
  size_pct: 28
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 35
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: price_vs_ema
        period_hours: 48
        pair: ETH/USD
        operator: eq
        value: above
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 65
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: price_vs_ema
        period_hours: 48
        pair: ETH/USD
        operator: eq
        value: below
exit:
  take_profit_pct: 7.0
  stop_loss_pct: 2.5
  timeout_hours: 96
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
