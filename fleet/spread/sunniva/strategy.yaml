name: sunniva
style: uni_eth_defi_spread
inspiration: UNI/ETH ratio captures DEX vs base layer dynamics, mean reverts on DeFi adoption cycles
pairs:
  - UNI/USD
spread:
  base: UNI/USD
  quote: ETH/USD
  analysis_pair: UNI_ETH_RATIO
position:
  size_pct: 25
  max_open: 1
  fee_rate: 0.001
entry:
  long:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: lt
        value: 35
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: below_lower
      - indicator: trend
        period_hours: 72
        operator: in
        value: [flat, down]
  short:
    conditions:
      - indicator: rsi
        period_hours: 14
        operator: gt
        value: 65
      - indicator: bollinger_position
        period_hours: 20
        operator: eq
        value: above_upper
      - indicator: trend
        period_hours: 72
        operator: in
        value: [flat, up]
exit:
  take_profit_pct: 8.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 8
  pause_hours: 48
  stop_if_down_pct: 18
