name: sinfjotli
style: trend_following
inspiration: "Trend following \u2014 enters on weekly trend direction with RSI confirmation"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_hours: 168
      operator: eq
      value: up
    - indicator: rsi
      period_hours: 24
      operator: lt
      value: 60
  short:
    conditions:
    - indicator: trend
      period_hours: 168
      operator: eq
      value: down
    - indicator: rsi
      period_hours: 24
      operator: gt
      value: 40
exit:
  take_profit_pct: 6.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 8
  pause_minutes: 180
  stop_if_down_pct: 18
