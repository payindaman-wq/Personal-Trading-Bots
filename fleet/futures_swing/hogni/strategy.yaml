name: hogni
style: breakout
inspiration: "Breakout specialist \u2014 MACD crossover on daily timeframe"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: macd_signal
      period_hours: 24
      operator: eq
      value: bullish
    - indicator: trend
      period_hours: 72
      operator: eq
      value: up
  short:
    conditions:
    - indicator: macd_signal
      period_hours: 24
      operator: eq
      value: bearish
    - indicator: trend
      period_hours: 72
      operator: eq
      value: down
exit:
  take_profit_pct: 5.5
  stop_loss_pct: 2.5
  timeout_hours: 108
risk:
  pause_if_down_pct: 8
  pause_minutes: 120
  stop_if_down_pct: 18
