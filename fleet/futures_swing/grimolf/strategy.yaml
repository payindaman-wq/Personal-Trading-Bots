name: grimolf
style: multi_signal
inspiration: "Multi-signal swing \u2014 trend + MACD + RSI all aligned"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_hours: 72
      operator: eq
      value: up
    - indicator: macd_signal
      period_hours: 24
      operator: eq
      value: bullish
    - indicator: rsi
      period_hours: 21
      operator: lt
      value: 62
  short:
    conditions:
    - indicator: trend
      period_hours: 72
      operator: eq
      value: down
    - indicator: macd_signal
      period_hours: 24
      operator: eq
      value: bearish
    - indicator: rsi
      period_hours: 21
      operator: gt
      value: 38
exit:
  take_profit_pct: 6.0
  stop_loss_pct: 3.0
  timeout_hours: 120
risk:
  pause_if_down_pct: 8
  pause_minutes: 120
  stop_if_down_pct: 16
