name: regin
style: rsi_divergence
inspiration: "RSI divergence swing \u2014 catches medium-term exhaustion reversals"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.0005
entry:
