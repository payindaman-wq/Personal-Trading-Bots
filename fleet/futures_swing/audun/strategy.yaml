name: audun
style: conservative
inspiration: "Conservative swing \u2014 only enters on highest-conviction setups"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 12
  max_open: 1
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_hours: 168
      operator: eq
      value: up
    - indicator: rsi
      period_hours: 24
      operator: lt
      value: 45
    - indicator: momentum_accelerating
      period_hours: 24
      operator: eq
      value: true
  short:
    conditions:
    - indicator: trend
      period_hours: 168
      operator: eq
      value: down
    - indicator: rsi
      period_hours: 24
      operator: gt
      value: 55
    - indicator: momentum_accelerating
      period_hours: 24
      operator: eq
      value: true
exit:
  take_profit_pct: 7.0
  stop_loss_pct: 3.0
  timeout_hours: 144
risk:
  pause_if_down_pct: 7
  pause_minutes: 180
  stop_if_down_pct: 15
