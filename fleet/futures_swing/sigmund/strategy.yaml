name: sigmund
style: swing_momentum
inspiration: "Swing momentum \u2014 multi-day trend riding with leverage"
league: futures_swing
leverage: 2
pairs:
- BTC/USD
- ETH/USD
- SOL/USD
- XRP/USD
- DOGE/USD
- AVAX/USD
- LINK/USD
- UNI/USD
- AAVE/USD
- NEAR/USD
- APT/USD
- SUI/USD
- ARB/USD
- OP/USD
- ADA/USD
- POL/USD
position:
  size_pct: 15
  max_open: 2
  fee_rate: 0.0005
entry:
  long:
    conditions:
    - indicator: trend
      period_hours: 48
      operator: eq
      value: up
    - indicator: momentum_accelerating
      period_hours: 24
      operator: eq
      value: true
  short:
    conditions:
    - indicator: trend
      period_hours: 48
      operator: eq
      value: down
    - indicator: momentum_accelerating
      period_hours: 24
      operator: eq
      value: true
exit:
  take_profit_pct: 5.0
  stop_loss_pct: 2.5
  timeout_hours: 96
risk:
  pause_if_down_pct: 8
  pause_minutes: 120
  stop_if_down_pct: 18
